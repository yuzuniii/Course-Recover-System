<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
<h:head>
    <title>Audit Logs — CRS</title>
    <link rel="stylesheet" type="text/css" href="#{request.contextPath}/css/styles.css" />
</h:head>
<h:body>
<div class="layout-shell">
    <ui:include src="/WEB-INF/includes/sidebar.xhtml">
        <ui:param name="activePage" value="audit-log" />
    </ui:include>

    <!-- Main -->
    <div class="main-content">

        <!-- Topbar -->
        <div class="topbar">
            <div class="topbar-left">
                <div class="page-title">Audit Logs</div>
                <div class="breadcrumb">System / Audit Log</div>
            </div>
            <div class="topbar-actions">
                <h:form id="topbarForm">
                    <p:commandButton value="Export Excel" icon="pi pi-file-excel" styleClass="btn btn-outline" style="margin-right:10px" ajax="false">
                        <p:dataExporter type="xls" target=":form:dt-logs" fileName="audit-logs" />
                    </p:commandButton>
                    
                    <p:commandButton value="Export PDF" icon="pi pi-file-pdf" styleClass="btn btn-outline" ajax="false">
                        <p:dataExporter type="pdf" target=":form:dt-logs" fileName="audit-logs" />
                    </p:commandButton>
                </h:form>
            </div>
        </div>

        <div class="page-content">
            <div class="card">
                <h:form id="form">
                    <p:dataTable id="dt-logs" widgetVar="dtLogs" var="log" value="#{auditLogBean.auditLogs}"
                                 filteredValue="#{auditLogBean.filteredAuditLogs}"
                                 paginator="true" rows="20" paginatorPosition="bottom"
                                 emptyMessage="No audit logs found." styleClass="modern-table">
                        
                        <f:facet name="header">
                            <div style="display:flex; justify-content: space-between; align-items: center;">
                                <span>System Activity Records</span>
                                <p:inputText id="globalFilter" onkeyup="PF('dtLogs').filter()" style="width:250px" placeholder="Search all fields..." />
                            </div>
                        </f:facet>

                        <p:column headerText="Timestamp" sortBy="#{log.createdAt}" width="180">
                            <h:outputText value="#{log.createdAt}">
                                <f:convertDateTime pattern="MMM dd, yyyy HH:mm:ss" type="localDateTime" />
                            </h:outputText>
                        </p:column>

                        <p:column headerText="Actor" sortBy="#{log.actorUsername}" filterBy="#{log.actorUsername}" filterMatchMode="exact">
                            <f:facet name="filter">
                                <p:selectOneMenu onchange="PF('dtLogs').filter()" styleClass="ui-custom-filter">
                                    <f:selectItem itemLabel="All Actors" itemValue="#{null}" noSelectionOption="true" />
                                    <f:selectItems value="#{auditLogBean.actors}" />
                                </p:selectOneMenu>
                            </f:facet>
                            <span style="font-weight:600">#{log.actorUsername}</span>
                        </p:column>

                        <p:column headerText="Action Type" sortBy="#{log.actionType}" filterBy="#{log.actionType}" filterMatchMode="exact">
                            <f:facet name="filter">
                                <p:selectOneMenu onchange="PF('dtLogs').filter()" styleClass="ui-custom-filter">
                                    <f:selectItem itemLabel="All Actions" itemValue="#{null}" noSelectionOption="true" />
                                    <f:selectItems value="#{auditLogBean.actionTypes}" />
                                </p:selectOneMenu>
                            </f:facet>
                            <span class="badge badge-#{log.actionType.toLowerCase().contains('delete') || log.actionType.toLowerCase().contains('fail') ? 'danger' : 
                                            (log.actionType.toLowerCase().contains('update') ? 'info' : 'success')}">
                                #{log.actionType}
                            </span>
                        </p:column>

                        <p:column headerText="Entity" sortBy="#{log.entityName}" width="150">
                            #{log.entityName}
                        </p:column>

                        <p:column headerText="Details">
                            #{log.details}
                        </p:column>

                    </p:dataTable>
                </h:form>
            </div>
        </div>
    </div>
</div>
</h:body>
</html>
