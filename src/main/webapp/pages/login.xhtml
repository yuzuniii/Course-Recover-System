<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui">
<h:head>
    <title>Login — CRS</title>
    <link rel="stylesheet" type="text/css" href="#{request.contextPath}/css/styles.css" />
    <style>
        body {
            background-color: var(--bg-page);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border);
        }
        .login-logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-logo .logo-title {
            font-size: 32px;
            font-weight: 800;
            color: var(--sidebar-accent);
            letter-spacing: -0.02em;
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-header h2 {
            margin: 0;
            font-size: 20px;
            color: var(--text-primary);
        }
        .login-header p {
            margin: 10px 0 0;
            color: var(--text-muted);
            font-size: 14px;
        }
    </style>
</h:head>
<h:body>
    <div class="login-container">
        <div class="login-logo">
            <div class="logo-title">CRS</div>
        </div>
        <div class="login-card">
            <div class="login-header">
                <h2>Welcome Back</h2>
                <p>Sign in to your account to continue</p>
            </div>
            
            <h:form id="loginForm">
                <p:growl id="messages" showDetail="true" />
                
                <div class="form-group" style="margin-bottom: 20px;">
                    <p:outputLabel for="username" value="Username" styleClass="form-label" />
                    <p:inputText id="username" value="#{loginBean.username}" required="true" 
                                 styleClass="form-input" placeholder="Enter your username" />
                </div>
                
                <div class="form-group" style="margin-bottom: 10px;">
                    <p:outputLabel for="password" value="Password" styleClass="form-label" />
                    <p:password id="password" value="#{loginBean.password}" required="true" 
                                styleClass="form-input" placeholder="Enter your password" feedback="false" />
                </div>
                
                <div style="text-align: right; margin-bottom: 25px;">
                    <p:link value="Forgot Password?" outcome="forgot-password.xhtml" 
                            style="font-size: 13px; color: var(--sidebar-accent); text-decoration: none; font-weight: 600;" />
                </div>
                
                <p:commandButton value="Sign In" action="#{loginBean.login}" update="messages"
                                 styleClass="btn btn-primary" style="width: 100%; padding: 12px;" />
            </h:form>
        </div>
        <p style="text-align: center; margin-top: 25px; color: var(--text-muted); font-size: 13px;">
            Demo accounts: <strong>admin</strong> / <strong>officer</strong>
        </p>
    </div>
</h:body>
</html>
