<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">
<h:head>
    <title>Login — Course Recovery System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" type="text/css" href="#{request.contextPath}/css/styles.css" />
</h:head>
<h:body styleClass="login-body">
    <div class="login-card">
        <div class="login-logo-container">
            <div class="login-logo-circle">CRS</div>
        </div>
        
        <div class="login-header">
            <h2>Welcome Back</h2>
            <p>Sign in to your account to continue</p>
        </div>
        
        <h:form id="loginForm" styleClass="login-form">
            <p:messages id="messages" globalOnly="true" closable="true">
                <p:autoUpdate />
            </p:messages>
            
            <div class="form-group">
                <p:outputLabel for="username" value="Username" styleClass="form-label" />
                <p:inputText id="username" value="#{loginBean.username}" required="true" 
                             styleClass="form-input-large" placeholder="Enter your username" />
            </div>
            
            <div class="form-group">
                <p:outputLabel for="password" value="Password" styleClass="form-label" />
                <p:password id="password" value="#{loginBean.password}" required="true" 
                            styleClass="form-input-large" placeholder="Enter your password" 
                            toggleMask="true" feedback="false" />
            </div>
            
            <p:commandButton value="Sign In" action="#{loginBean.login}" 
                             update="messages" styleClass="btn-signin" />
            
            <div class="login-footer-text">
                Demo credentials: <strong>admin</strong> / <strong>officer</strong>
            </div>
        </h:form>
    </div>
</h:body>
</html>
