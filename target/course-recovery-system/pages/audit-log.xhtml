<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
<h:head>
    <title>Audit Log</title>
    <link rel="stylesheet" type="text/css" href="#{request.contextPath}/css/styles.css" />
</h:head>
<h:body>
    <div class="layout">
        <div class="header">
            <div class="title">Audit Log</div>
            <div class="nav"><a href="#{request.contextPath}/pages/dashboard.xhtml">Dashboard</a></div>
        </div>
        <div class="table-wrapper">
            <h:dataTable value="#{auditLogBean.auditLogs}" var="log" styleClass="table">
                <h:column><f:facet name="header">Actor</f:facet>#{log.actorUsername}</h:column>
                <h:column><f:facet name="header">Action</f:facet>#{log.actionType}</h:column>
                <h:column><f:facet name="header">Entity</f:facet>#{log.entityName}</h:column>
                <h:column><f:facet name="header">Details</f:facet>#{log.details}</h:column>
                <h:column><f:facet name="header">Timestamp</f:facet>#{log.createdAt}</h:column>
            </h:dataTable>
        </div>
    </div>
</h:body>
</html>
