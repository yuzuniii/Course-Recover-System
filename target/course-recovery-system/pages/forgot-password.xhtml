<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html">
<h:head>
    <title>Reset Password</title>
    <link rel="stylesheet" type="text/css" href="#{request.contextPath}/css/styles.css" />
</h:head>
<h:body>
    <div class="form-panel">
        <h2>Reset Password</h2>
        <p class="subtle">Enter your email address to receive a temporary password.</p>
        
        <h:form id="resetForm">
            <h:messages globalOnly="true" style="color:#16a34a;" errorStyle="color:#b91c1c;"/>
            
            <div>
                <label>Email Address</label>
                <h:inputText value="#{forgotPasswordBean.email}" required="true" requiredMessage="Email is required" style="width:100%;margin:8px 0 16px;padding:10px;"/>
            </div>
            
            <h:commandButton value="Send Reset Link" action="#{forgotPasswordBean.resetPassword}" styleClass="button"/>
            
            <div style="text-align: center; margin-top: 16px;">
                <h:outputLink value="#{request.contextPath}/pages/login.xhtml" style="color: #0095f6; text-decoration: none; font-size: 14px;">
                    ← Back to Login
                </h:outputLink>
            </div>
        </h:form>
    </div>
</h:body>
</html>
