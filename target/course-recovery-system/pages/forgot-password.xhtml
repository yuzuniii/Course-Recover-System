<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui">
<h:head>
    <title>Reset Password — CRS</title>
    <link rel="stylesheet" type="text/css" href="#{request.contextPath}/css/styles.css" />
    <style>
        body {
            background-color: var(--bg-page);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border);
        }
        .login-logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-logo .logo-title {
            font-size: 32px;
            font-weight: 800;
            color: var(--sidebar-accent);
            letter-spacing: -0.02em;
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-header h2 {
            margin: 0;
            font-size: 20px;
            color: var(--text-primary);
        }
        .login-header p {
            margin: 10px 0 0;
            color: var(--text-muted);
            font-size: 14px;
        }
    </style>
</h:head>
<h:body>
    <div class="login-container">
        <div class="login-logo">
            <div class="logo-title">CRS</div>
        </div>
        <div class="login-card">
            <div class="login-header">
                <h2>Reset Password</h2>
                <p>Enter your email to receive a temporary password</p>
            </div>
            
            <h:form id="resetForm">
                <p:growl id="messages" showDetail="true" />
                
                <div class="form-group" style="margin-bottom: 25px;">
                    <p:outputLabel for="email" value="Email Address" styleClass="form-label" />
                    <p:inputText id="email" value="#{forgotPasswordBean.email}" required="true" 
                                 requiredMessage="Email is required" styleClass="form-input" 
                                 placeholder="Enter your email address" />
                </div>
                
                <p:commandButton value="Send Reset Link" action="#{forgotPasswordBean.resetPassword}" 
                                 update="messages" styleClass="btn btn-primary" 
                                 style="width: 100%; padding: 12px; margin-bottom: 20px;" />
                
                <div style="text-align: center;">
                    <p:link value="← Back to Login" outcome="login.xhtml" 
                            style="font-size: 13px; color: var(--text-muted); text-decoration: none; font-weight: 600;" />
                </div>
            </h:form>
        </div>
    </div>
</h:body>
</html>
