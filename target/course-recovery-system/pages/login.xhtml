<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html">
<h:head>
    <title>CRS Login</title>
    <link rel="stylesheet" type="text/css" href="#{request.contextPath}/css/styles.css" />
</h:head>
<h:body>
    <div class="form-panel">
        <h2>Course Recovery System</h2>
        <p class="subtle">Sign in as Course Administrator or Academic Officer.</p>
        <h:form>
            <h:messages globalOnly="true" style="color:#b91c1c;"/>
            <div>
                <label>Username</label>
                <h:inputText value="#{loginBean.username}" style="width:100%;margin:8px 0 16px;padding:10px;"/>
            </div>
            <div>
                <label>Password</label>
                <h:inputSecret value="#{loginBean.password}" style="width:100%;margin:8px 0 16px;padding:10px;"/>
            </div>
            <h:commandButton value="Login" action="#{loginBean.login}" styleClass="button"/>
        </h:form>
        <p class="subtle">Demo accounts: admin/admin123 and officer/officer123</p>
    </div>
</h:body>
</html>
